syntax = "proto3";

package lyric;

message MetaCreator {
  // Role of the creator, such as lyricist or composer.
  string role = 1;

  // Names of the creators for this role.
  repeated string names = 2;
}

message MetaUnknown {
  // Original meta key.
  string key = 1;

  // Raw value.
  string value = 2;
}

message Meta {
  // Unrecognized meta preserved by its original key.
  repeated MetaUnknown unknowns = 1;

  // Lyric time offset in milliseconds.
  sint32 offset = 2;

  // Song duration in milliseconds.
  uint32 duration = 3;

  // Song titles, one per language when localized.
  repeated string titles = 4;

  // Song singers.
  repeated string singers = 5;

  // Song albums, one per language when localized.
  repeated string albums = 6;

  // Lyric authors or transcribers.
  repeated string authors = 7;

  // International Standard Recording Codes.
  repeated string isrcs = 8;

  // Song creators such as lyricist or composer.
  repeated MetaCreator creators = 9;
}
