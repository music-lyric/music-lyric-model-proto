syntax = "proto3";

package lyric;

message MetaText {
  // Language tag of this value; unset means unspecified or default.
  optional string language = 1;

  // Text value.
  string value = 2;
}

message MetaCredit {
  // Role of the credit, such as lyricist or composer.
  string role = 1;

  // Names credited for this role.
  repeated MetaText names = 2;
}

message MetaUnknown {
  // Original meta key.
  string key = 1;

  // Raw value.
  string value = 2;
}

message Meta {
  // Unrecognized meta preserved by its original key.
  repeated MetaUnknown unknowns = 1;

  // Lyric time offset in milliseconds.
  sint32 offset = 2;

  // Song duration in milliseconds.
  uint32 duration = 3;

  // Song titles.
  repeated MetaText titles = 4;

  // Song artists.
  repeated MetaText artists = 5;

  // Song albums.
  repeated MetaText albums = 6;

  // Authors or transcribers of the lyric file, not the song itself.
  repeated MetaText authors = 7;

  // International Standard Recording Codes.
  repeated string isrcs = 8;

  // Song credits such as lyricist or composer.
  repeated MetaCredit credits = 9;
}
