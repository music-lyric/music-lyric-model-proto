syntax = "proto3";

package lyric;

import "common/time.proto";

import "agent/agent.proto";

import "word/content.proto";

import "line/annotation.proto";

message LineNormal {
  // Time range of the line.
  Time time = 1;

  // Performing agent of this line.
  optional LineAgent agent = 2;

  // Words composing the line in order.
  repeated Word words = 3;

  // Annotations applied to the whole line.
  // A binding may populate these by aggregating word annotations; items so produced set `derived = true`.
  LineAnnotation annotation = 4;

  // Language tags of this line.
  // A binding may fall back to the languages of its words when this is empty.
  repeated string languages = 5;

  // Background lines attached to this line.
  repeated LineBackground backgrounds = 6;
}

message LineBackground {
  // Time range of the line.
  Time time = 1;

  // Performing agent of this line.
  optional LineAgent agent = 2;

  // Words composing the line in order.
  repeated Word words = 3;

  // Annotations applied to the whole line.
  // A binding may populate these by aggregating word annotations; items so produced set `derived = true`.
  LineAnnotation annotation = 4;

  // Language tags of this line.
  // A binding may fall back to the languages of its words when this is empty.
  repeated string languages = 5;
}

message LineInterlude {
  // Time range of the line.
  Time time = 1;
}

message Line {
  oneof body {
    LineNormal normal = 1;
    LineInterlude interlude = 2;
  }
}
